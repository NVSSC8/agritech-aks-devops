#cloud-config

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - unzip
  - zip
  - git
  - jq
  - python3
  - python3-pip
  - apt-transport-https
  - ca-certificates
  - software-properties-common
  - gnupg
  - lsb-release

runcmd:

  ####################################################################
  # Create Azure DevOps Agent User
  ####################################################################
  - useradd -m -s /bin/bash azagent || true
  - mkdir -p /home/azagent/agent
  - chown -R azagent:azagent /home/azagent

  ####################################################################
  # Java 17
  ####################################################################
  - apt-get update
  - apt-get install -y openjdk-17-jdk

  ####################################################################
  # Maven
  ####################################################################
  - apt-get install -y maven

  ####################################################################
  # Docker
  ####################################################################
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker azagent

  ####################################################################
  # Terraform
  ####################################################################
  - wget -qO- https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
  - echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/hashicorp.list
  - apt-get update
  - apt-get install -y terraform
  - terraform version

  ####################################################################
  # Azure CLI
  ####################################################################
  - curl -sL https://aka.ms/InstallAzureCLIDeb | bash
  - az version

  ####################################################################
  # kubectl
  ####################################################################
  - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
  - install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
  - kubectl version --client

  ####################################################################
  # Helm
  ####################################################################
  - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  - helm version

  ####################################################################
  # Trivy
  ####################################################################
  - |
      TRIVY_VERSION=$(curl -fsSL https://api.github.com/repos/aquasecurity/trivy/releases/latest | grep '"tag_name"' | cut -d '"' -f4 | sed 's/^v//')

      wget -O trivy.deb \
      "https://github.com/aquasecurity/trivy/releases/download/v$${TRIVY_VERSION}/trivy_$${TRIVY_VERSION}_Linux-64bit.deb"

      dpkg -i trivy.deb

      trivy --version

  ####################################################################
  # Download Azure DevOps Agent
  ####################################################################
  - |
      sudo -u azagent bash -c '
        cd /home/azagent/agent &&
        wget https://download.agent.dev.azure.com/agent/5.275.0/pipelines-agent-linux-x64-5.275.0.tar.gz &&
        tar -xzf pipelines-agent-linux-x64-5.275.0.tar.gz
      '

  ####################################################################
  # Configure Azure DevOps Agent
  ####################################################################
  - |
      sudo -u azagent bash -c '
        cd /home/azagent/agent &&
        ./config.sh \
          --unattended \
          --url "${azure_devops_url}" \
          --auth pat \
          --token "${pat_token}" \
          --pool "${agent_pool}" \
          --agent "${agent_name}" \
          --acceptTeeEula \
          --replace \
          --work _work
      '

  ####################################################################
  # Install Agent Service
  ####################################################################
  - |
      cd /home/azagent/agent
      ./svc.sh install azagent

  ####################################################################
  # Reload Systemd
  ####################################################################
  - systemctl daemon-reload

  ####################################################################
  # Start Agent Service
  ####################################################################
  - |
      cd /home/azagent/agent
      ./svc.sh start

  ####################################################################
  # Restart Agent Service
  ####################################################################
  - systemctl restart $(systemctl list-units --type=service --no-legend | awk '/vsts.agent/ {print $1}' | head -n1) || true

  ####################################################################
  # Verify Agent Environment
  ####################################################################
  - sudo -u azagent docker version
  - sudo -u azagent docker ps