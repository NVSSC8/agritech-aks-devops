# -------------------------------
# Replica Configuration
# -------------------------------

replicaCount: 2

# -------------------------------
# Docker Image
# -------------------------------

image:
   repository: ""
   tag: ""
   pullPolicy: IfNotPresent

imagePullSecrets: []

# -------------------------------
# Application Configuration
# -------------------------------

nameOverride: ""
fullnameOverride: ""

containerPort: 8080

# -------------------------------
# Kubernetes Service
# -------------------------------

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# -------------------------------
# Ingress
# -------------------------------

ingress:
  enabled: true
  className: nginx

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

  hosts:
    - host: api.agritech.local
      paths:
        - path: /
          pathType: Prefix

# -------------------------------
# Resources
# -------------------------------

resources:
  requests:
    cpu: 200m
    memory: 256Mi

  limits:
    cpu: 500m
    memory: 512Mi

# -------------------------------
# Horizontal Pod Autoscaler
# -------------------------------

autoscaling:
  enabled: true

  minReplicas: 2
  maxReplicas: 5

  targetCPUUtilizationPercentage: 70

# -------------------------------
# Azure Key Vault Secrets
# -------------------------------

secretProviderClass: agritech-backend-spc

# -------------------------------
# ConfigMap Values
# -------------------------------

config:

  SPRING_PROFILES_ACTIVE: prod

  DB_HOST: mysql

  DB_PORT: "3306"

  DB_NAME: agritechdb


keyVault:

  clientId: e2cb4a78-92ee-4a5a-914c-96984a2e623c


  tenantId: 3efa21b7-40cf-43f0-84c0-1116b9844336


  name:  "agritech-kv"

  secrets:

    dbUsername: "db-username"

    dbPassword: "db-password"

    jwtSecret: "jwt-secret"