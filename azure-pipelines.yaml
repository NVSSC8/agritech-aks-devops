trigger:
  - master
  
variables:
  - group: Agritech-Dev-Variables

  - name: backendImageName
    value: agritech-backend

  - name: frontendImageName
    value: agritech-frontend

  - name: imageTag
    value: $(Build.BuildId)

  - name: terraformWorkingDirectory
    value: infra

  - name: kubernetesNamespace
    value: agritech

  - name: backendHelmChart
    value: helm/backend 

  - name: frontendHelmChart
    value: helm/frontend

stages:



  # ==========================================================
  # Stage 2 - Build
  # ==========================================================

  - stage: Build
    displayName: "Build Applications"
    dependsOn: []
    pool:
      name: nvssc-selfhost

    jobs:
      - job: BuildBackend
        displayName: "Build Spring Boot Backend"
        steps:
          - checkout: self

          # Verify Java & Maven installed by Cloud-init
          - script: |
              java -version
              mvn -version
            displayName: "Verify Java and Maven"

          - script: |
              export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
              export PATH=$JAVA_HOME/bin:$PATH

              echo "JAVA_HOME=$JAVA_HOME"
              java -version
              mvn -version

              cd backend
              mvn clean package -DskipTests
            displayName: "Build Backend" 
  # ==========================================================
  # Stage 3 - Test
  # ==========================================================

  - stage: Test
    displayName: "Run Backend Tests"
    dependsOn: Build
    pool:
      name: nvssc-selfhost

    jobs:
      - job: UnitTests
        displayName: "Execute Unit Tests"
        steps:
          - checkout: self

          - script: |
              cd backend
              mvn test
            displayName: "Run Maven Tests"
            env:
              SPRING_DATASOURCE_URL: $(SPRING_DATASOURCE_URL)
              SPRING_DATASOURCE_USERNAME: $(SPRING_DATASOURCE_USERNAME)
              SPRING_DATASOURCE_PASSWORD: $(SPRING_DATASOURCE_PASSWORD)


          - task: PublishTestResults@2
            displayName: "Publish Test Results"
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "**/surefire-reports/TEST-*.xml"
              failTaskOnFailedTests: true

  # ==========================================================
  # Stage 4 - SonarQube Analysis
  # ==========================================================

  - stage: SonarQube
    displayName: "Static Code Analysis"
    dependsOn: Test
    pool:
      name: nvssc-selfhost

    jobs:
      - job: SonarAnalysis
        displayName: "Analyze Source Code"
        steps:
          - checkout: self

          - task: SonarCloudPrepare@4
            displayName: "Prepare SonarQube Cloud"
            inputs:
              SonarCloud: "SonarQubeCloud-ServiceConnection"
              organization: "nvssc8"
              scannerMode: "Other"

          - script: |
              set -e
          
              export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
              export PATH=$JAVA_HOME/bin:$PATH

              java -version
              mvn -version

              cd backend
              mvn clean verify sonar:sonar
            displayName: "Run Sonar Scan"

          - task: SonarCloudPublish@4
            displayName: "Publish Quality Gate"
            inputs:
              pollingTimeoutSec: "300"

  # ==========================================================
  # Stage 5 - Docker Build
  # ==========================================================

  - stage: DockerBuild
    displayName: "Build Docker Images"
    dependsOn: SonarQube
    pool:
      name: nvssc-selfhost

    jobs:
      - job: Docker
        displayName: "Build Backend & Frontend Images"
        steps:
          - checkout: self

          - script: |
              docker version
            displayName: "Verify Docker Installation"

          # Backend Image
          - task: Docker@2
            displayName: "Build Backend Image"
            inputs:
              command: build
              Dockerfile: "backend/Dockerfile"
              buildContext: "backend"
              repository: "$(backendImageName)"
              tags: |
                $(imageTag)

          # Frontend Image
          - task: Docker@2
            displayName: "Build Frontend Image"
            inputs:
              command: build
              Dockerfile: "frontend/Dockerfile"
              buildContext: "frontend"
              repository: "$(frontendImageName)"
              tags: |
                $(imageTag)

  # ==========================================================
  # Stage 6 - Trivy Security Scan
  # ==========================================================

  - stage: Trivy
    displayName: "Container Security Scan"
    dependsOn: DockerBuild
    pool:
      name: nvssc-selfhost

    jobs:
      - job: TrivyScan
        displayName: "Scan Docker Images"
        steps:
          - checkout: self

          - script: |
              trivy --version
            displayName: "Verify Trivy Installation"

          - script: |
              trivy image $(backendImageName):$(imageTag)
            displayName: "Scan Backend Image"

          - script: |
              trivy image $(frontendImageName):$(imageTag)
            displayName: "Scan Frontend Image"

  # ==========================================================
  # Stage 7 - Push Images to Azure Container Registry
  # ==========================================================

  - stage: PushACR
    displayName: "Push Docker Images to Azure Container Registry"
    dependsOn: Trivy
    pool:
      name: nvssc-selfhost

    jobs:
      - job: PushImages
        displayName: "Push Backend and Frontend Images"
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Login to Azure and ACR"
            inputs:
              azureSubscription: "Azure-ServiceConnection"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(ACR_NAME)

          - script: |
              docker tag $(backendImageName):$(imageTag) \
              $(ACR_NAME).azurecr.io/$(backendImageName):$(imageTag)

              docker push \
              $(ACR_NAME).azurecr.io/$(backendImageName):$(imageTag)
            displayName: "Push Backend Image"

          - script: |
              docker tag $(frontendImageName):$(imageTag) \
              $(ACR_NAME).azurecr.io/$(frontendImageName):$(imageTag)

              docker push \
              $(ACR_NAME).azurecr.io/$(frontendImageName):$(imageTag)
            displayName: "Push Frontend Image"

  # ==========================================================
  # Stage 8 - Deploy to AKS
  # ==========================================================

  - stage: Deploy
    displayName: "Deploy Application to AKS"
    dependsOn: PushACR
    pool:
      name: nvssc-selfhost

    jobs:
      - deployment: DeployToAKS
        displayName: "Deploy Backend and Frontend"
        environment: "Development"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                # Login to Azure
                - task: AzureCLI@2
                  displayName: "Login to Azure"
                  inputs:
                    azureSubscription: "Azure-ServiceConnection"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az account show
                  
                #  NEW: Create database if not exists + Add firewall rule  
                - task: AzureCLI@2
                  displayName: "Create Database & Configure Firewall"
                  inputs:
                    azureSubscription: "Azure-ServiceConnection"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      # Create database if not exists
                      az mysql flexible-server db create \
                        --resource-group $(RESOURCE_GROUP) \
                        --server-name agritech-dev-mysql \
                        --database-name agritechdb \
                        --output none 2>/dev/null || echo "Database already exists"

                      # Add firewall rule allowing ALL Azure services (safe)
                      az mysql flexible-server firewall-rule create \
                        --resource-group $(RESOURCE_GROUP) \
                        --name agritech-dev-mysql \
                        --rule-name "AllowAzureServices" \
                        --start-ip-address 0.0.0.0 \
                        --end-ip-address 0.0.0.0 \
                        --output none 2>/dev/null || echo "Firewall rule already exists"

                # Get AKS Credentials
                - task: AzureCLI@2
                  displayName: "Get AKS Credentials"
                  inputs:
                    azureSubscription: "Azure-ServiceConnection"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -e

                      echo "Getting AKS credentials..."

                      az aks get-credentials \
                        --resource-group $(RESOURCE_GROUP) \
                        --name $(AKS_NAME) \
                        --overwrite-existing

                      echo "Current Context:"
                      kubectl config current-context

                      echo "AKS Nodes:"
                      kubectl get nodes

                      echo "Namespaces:"
                      kubectl get ns

                # Install Secrets Store CSI Driver
                - script: |
                    helm repo add secrets-store-csi-driver https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
                    helm repo update
                    helm upgrade --install csi-driver \
                      secrets-store-csi-driver/secrets-store-csi-driver \
                      --namespace kube-system
                  displayName: "Install CSI Driver"

                # Install Azure Provider
                - script: |
                    helm repo add csi-secrets-store-provider-azure \
                      https://azure.github.io/secrets-store-csi-driver-provider-azure/charts

                    helm repo update
                
                    helm upgrade --install azure-provider \
                      csi-secrets-store-provider-azure/csi-secrets-store-provider-azure \
                      --namespace kube-system \
                      --set secrets-store-csi-driver.install=false
                  displayName: "Install Azure Provider"

                # Deploy Backend
                - script: |
                    helm upgrade --install backend \
                      $(backendHelmChart) \
                      --namespace $(kubernetesNamespace) \
                      --create-namespace \
                      --set image.repository=$(ACR_NAME).azurecr.io/$(backendImageName) \
                      --set image.tag=$(imageTag) \
                      --set springDatasource.url="$(SPRING_DATASOURCE_URL)" \
                      --set springDatasource.username="$(SPRING_DATASOURCE_USERNAME)" \
                      --set springDatasource.password="$(SPRING_DATASOURCE_PASSWORD)" \
                      --set ingress.enabled=false
                  displayName: "Deploy Backend"

                # Deploy Frontend
                - script: |
                    helm upgrade --install frontend \
                      $(frontendHelmChart) \
                      --namespace $(kubernetesNamespace) \
                      --set image.repository=$(ACR_NAME).azurecr.io/$(frontendImageName) \
                      --set image.tag=$(imageTag) \
                      --set ingress.enabled=false
                  displayName: "Deploy Frontend"
                  
                # Install NGINX Ingress Controller
                - script: |
                    kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.12.1/deploy/static/provider/cloud/deploy.yaml
                    kubectl wait --namespace ingress-nginx \
                      --for=condition=ready pod \
                      --selector=app.kubernetes.io/component=controller \
                      --timeout=120s
                  displayName: "Install NGINX Ingress Controller"

                # Create Ingress
                - script: |
                    kubectl apply -f - <<EOF
                    apiVersion: networking.k8s.io/v1
                    kind: Ingress
                    metadata:
                      name: agritech-ingress
                      namespace: $(kubernetesNamespace)
                    spec:
                      ingressClassName: nginx
                      defaultBackend:
                        service:
                          name: frontend-frontend
                          port:
                            number: 80
                      rules:
                      - host: "oktevanvs.buzz"
                        http:
                          paths:
                          - path: /
                            pathType: Prefix
                            backend:
                              service:
                                name: frontend-frontend
                                port:
                                  number: 80
                      - host: "api.oktevanvs.buzz"
                        http:
                          paths:
                          - path: /
                            pathType: Prefix
                            backend:
                              service:
                                name: backend-backend
                                port:
                                  number: 80
                    EOF
                  displayName: "Create Ingress"

                # Create IP-specific Ingress
                - script: |
                    cat << 'EOF' | kubectl apply -f -
                    apiVersion: networking.k8s.io/v1
                    kind: Ingress
                    metadata:
                      name: agritech-ip-ingress
                      namespace: $(kubernetesNamespace)
                    spec:
                      ingressClassName: nginx
                      rules:
                      - http:
                          paths:
                          - path: /
                            pathType: Prefix
                            backend:
                              service:
                                name: frontend-frontend
                                port:
                                  number: 80
                    EOF
                  displayName: "Create IP Ingress"    
                

  # ==========================================================
  # Stage 9 - Verification
  # ==========================================================

  - stage: Verify
    displayName: "Verify AKS Deployment"
    dependsOn: Deploy
    pool:
      name: nvssc-selfhost

    jobs:
      - job: VerifyDeployment
        displayName: "Verify Kubernetes Resources"
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Get AKS Credentials"
            inputs:
              azureSubscription: "Azure-ServiceConnection"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials \
                  --resource-group $(RESOURCE_GROUP) \
                  --name $(AKS_NAME) \
                  --overwrite-existing

          - script: |
              kubectl get nodes
            displayName: "Verify Nodes"

          - script: |
              kubectl get pods -n $(kubernetesNamespace)
            displayName: "Verify Pods"

          - script: |
              kubectl get svc -n $(kubernetesNamespace)
            displayName: "Verify Services"

          - script: |
              kubectl get ingress -n $(kubernetesNamespace)
            displayName: "Verify Ingress"

          - script: |
              kubectl rollout status deployment/backend-backend -n $(kubernetesNamespace)
            displayName: "Verify Backend Rollout"

          - script: |
              kubectl rollout status deployment/frontend-frontend -n $(kubernetesNamespace)
            displayName: "Verify Frontend Rollout"


          # Get the application URL and test accessibility
          - script: |
              echo "========================================="
              echo "  Application URLs"
              echo "========================================="
              
              # Get Ingress IP
              for i in $(seq 1 12); do
                INGRESS_IP=$(kubectl get ingress agritech-ingress -n $(kubernetesNamespace) -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
                if [ -n "$INGRESS_IP" ]; then
                  echo "✅ Ingress IP: $INGRESS_IP"
                  break
                fi
                echo "Waiting for IP... ($i/12)"
                sleep 10
              done
              
              echo ""
              echo "📌 Access via browser:"
              echo "   Direct IP (works now): http://$INGRESS_IP"
              echo "   Frontend:             http://oktevanvs.buzz"
              echo "   Backend API:          http://api.oktevanvs.buzz/actuator/health"
              echo ""
              echo "📌 GoDaddy DNS records to add:"
              echo "   @   → A → $INGRESS_IP"
              echo "   api → A → $INGRESS_IP"
            displayName: "Get Application URLs" 